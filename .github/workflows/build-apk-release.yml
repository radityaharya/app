# Secrets required (radityaharya/app → Settings → Secrets → Actions):
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD, GOOGLE_MAPS_ANDROID_KEY
# Run scripts/push-gh-secrets.sh once to populate them.
name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version name override (e.g. 1.2.0) — leave blank to use app.config.js'
        required: false
        type: string

jobs:
  build:
    name: Assemble release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner specs
        run: echo "CPUs=$(nproc) RAM=$(free -h | awk '/Mem:/ {print $2}')"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project
        working-directory: apps/mobile
        env:
          GOOGLE_MAPS_ANDROID_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}
        run: pnpm exec expo prebuild --platform android --no-install --clean

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true
          build-root-directory: apps/mobile/android

      - name: Override version name
        if: ${{ inputs.version_bump != '' }}
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ inputs.version_bump }}\"/" \
            apps/mobile/android/app/build.gradle

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode \
            > apps/mobile/android/app/release.keystore

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          EXPO_USE_METRO_WORKSPACE_ROOT: 1
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/apps/mobile/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(grep versionName apps/mobile/android/app/build.gradle \
            | grep -oP '"\K[^"]+')
          BUILD=$(grep versionCode apps/mobile/android/app/build.gradle \
            | grep -oP '\d+' | head -1)
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            commuter-${VERSION}-${BUILD}-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: commuter-release-apk
          path: commuter-*-release.apk
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f apps/mobile/android/app/release.keystore
